<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Mastery</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <header>
            <h2>My Advance todo Application</h2>
        </header>

        <main>
            <div class="input-group">
                <input type="text" id="query-area" placeholder="Enter your query....">
                <button type="button" id="add-btn">Add Query</button>
            </div>

            <ul id="task-list">
                <li class="todo-list">
                    <input type="checkbox" id="checkbox">
                    <input type="text" name="" id="list">
                    <input type="button" id="btn"  value="Edit">
                    <input type="button" id="btn" value="Delete">

                </li>
            </ul>
        </main>
    </div>
    <script src="index.js"></script>
</body>

</html>
