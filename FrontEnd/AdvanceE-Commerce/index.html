<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clothes Paradise Collection Web Application</title>
  <link rel="stylesheet" href="Stylesheets/index.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="shortcut icon" href="https://cdn.pixabay.com/photo/2015/11/16/16/30/clothing-1045960_1280.jpg"
    type="image/x-icon" />
</head>

<body>
  <!-- Header -->
  <header>
    <h1>
      <i class="fas fa-tag" style="color: black"></i> E-Commerce Paradise
      Collection
    </h1>
    <nav>
      <nav>
        <button id="lightMode">
          <i id="theme-toggle-icon" class="fas fa-moon" style="cursor: pointer; font-size: 24px"></i>
        </button>
        <button id="darkMode">
          <i class="fas fa-sun" style="font-size: 24px; color: orange"></i>
        </button>

        <a href="index.html">Home</a>
        <a href="Pages/AllProductList.html">All Products</a>
        <a href="./Pages/CartList.html">Cart List</a>

        <a href="#" class="user-name"> Manish Kumar</a>
        <button id="user-logo"><i class="fas fa-user"></i></button>
      </nav>
    </nav>
    <input type="button" id="logout-btn" value="Logout" />
  </header>

  <!-- Main Content -->
  <div class="Maincontainer">
    <!-- Hero Image of the web application -->
    <img class="hero-image"
      src="https://www.hatkay.com/cdn/shop/articles/How-to-Look-Stylish-in-Traditional-Indian-Clothing-Where-to-Buy-the-Best-Fashionable-Ethnic-Wear-for-Women-Online.jpg?v=1671543652" />

    <!-- Dynamic content will go here -->
    <div class="product-container">
      <div class="product-box">
        <h2>Women Jwellary</h2>
        <a href="Pages/Category.html?category=womens-jewellery">
          <img class="product-img" src="https://wallpapercave.com/wp/wp8697695.jpg" alt="womens-jewellery" />
        </a>
      </div>

      <div class="product-box">
        <h2>Women Dresses</h2>
        <a href="Pages/Category.html?category=womens-dresses">
          <img class="product-img" src="https://tse1.mm.bing.net/th?id=OIP.Xd6KRKolwvkXDaUXJMLQAAHaEK&pid=Api&P=0&h=180"
            alt="Women-Dresses" />
        </a>
      </div>

      <div class="product-box">
        <h2>Women Watches</h2>
        <a href="Pages/Category.html?category=womens-watches">
          <img class="product-img" src="https://wallpaperaccess.com/full/851966.jpg" alt="Women-watches" />
        </a>
      </div>

      <div class="product-box">
        <h2>Women Bags</h2>

        <a href="Pages/Category.html?category=womens-bags">
          <img class="product-img" src="https://cdn.wallpapersafari.com/55/64/uaN7Tf.jpg" alt="Women-Bags" />
        </a>
      </div>

      <div class="product-box">
        <h2>Women Shoes</h2>

        <a href="Pages/Category.html?category=womens-shoes">
          <img class="product-img" src="https://getwallpapers.com/wallpaper/full/f/a/5/646080.jpg"
            alt="Women-Shoes" /></a>
      </div>

      <div class="product-box">
        <h2>Makeup Products</h2>

        <a href="Pages/Category.html?category=beauty">
          <img class="product-img"
            src="https://cdn.logojoy.com/wp-content/uploads/20191023114758/AdobeStock_224061283-min.jpeg"
            alt="Beauty-Products" />
        </a>
      </div>
    </div>

    <!-- Footer -->
    <footer>
      <p>&copy; 2025 Raste Ka Maal Saste Mein. All rights reserved.</p>
    </footer>
  </div>

  <script src="./Js-Files/index.js"></script>
</body>

</html>
